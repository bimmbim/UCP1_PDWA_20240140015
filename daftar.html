<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - Tech Community</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #111;
        color: #ddd;
        font-family: "Segoe UI", sans-serif;
        padding-bottom: 60px;
      }

      .navbar {
        background-color: #1a1a1a !important;
        border-bottom: 1px solid #2a2a2a;
      }
      .navbar-brand {
        font-weight: 700;
        color: #fff !important;
      }
      .nav-link {
        color: #aaa !important;
      }
      .nav-link:hover,
      .nav-link.active {
        color: #fff !important;
      }

      .form-box {
        max-width: 480px;
        margin: 50px auto;
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 30px;
      }

      .form-box h4 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .form-box .sub {
        color: #666;
        font-size: 0.85rem;
        margin-bottom: 22px;
      }
      .form-label {
        color: #888;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .form-control,
      .form-select {
        background-color: #111 !important;
        border: 1px solid #2a2a2a;
        color: #ddd !important;
        border-radius: 8px;
      }
      .form-control:focus,
      .form-select:focus {
        border-color: #555;
        box-shadow: none;
      }
      .form-control::placeholder {
        color: #444;
      }
      .form-select option {
        background: #111;
        color: #ddd;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        text-align: center;
        padding: 14px;
        color: #444;
        font-size: 0.82rem;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./daftar.html">Daftar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./multimedia.html">Multimedia</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="form-box">
        <h4>📝 Form Pendaftaran</h4>
        <p class="sub">Isi data di bawah untuk bergabung.</p>

        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input
            type="text"
            class="form-control"
            id="nama"
            placeholder="Masukkan nama lengkap"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="contoh@email.com"
          />
        </div>
        <div class="mb-4">
          <label class="form-label">Bidang Minat</label>
          <select class="form-select" id="minat">
            <option value="">-- Pilih Bidang Minat --</option>
            <option>Web Development</option>
            <option>Mobile Development</option>
            <option>Data Science</option>
            <option>Cybersecurity</option>
            <option>AI & Machine Learning</option>
            <option>Cloud Computing</option>
          </select>
        </div>

        <button
          class="btn btn-light w-100 fw-semibold mb-2"
          onclick="submitForm()"
        >
          Daftar Sekarang
        </button>
        <a href="./index.html" class="btn btn-outline-secondary w-100"
          >← Kembali ke Home</a
        >
      </div>
    </div>

    <footer>&copy; 2026 Tech Community</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function submitForm() {
        var nama = document.getElementById("nama").value.trim();
        var email = document.getElementById("email").value.trim();
        var minat = document.getElementById("minat").value;

        if (nama === "") {
          alert("Nama tidak boleh kosong!");
          return;
        }
        if (email === "" || !email.includes("@")) {
          alert("Email tidak valid!");
          return;
        }
        if (minat === "") {
          alert("Pilih bidang minat dulu!");
          return;
        }

        var data = { nama: nama, email: email, minat: minat };

        // Simpan ke localStorage supaya tampil di tabel
        var anggota =
          JSON.parse(localStorage.getItem("anggotaTechCommunity")) || [];
        anggota.push(data);
        localStorage.setItem("anggotaTechCommunity", JSON.stringify(anggota));

        // Tandai untuk notif di index.html
        sessionStorage.setItem("newMember", JSON.stringify(data));

        // Popup alert berhasil
        alert("Pendaftaran berhasil! Selamat datang, " + nama + "!");

        document.getElementById("nama").value = "";
        document.getElementById("email").value = "";
        document.getElementById("minat").value = "";
      }
    </script>
  </body>
</html>
