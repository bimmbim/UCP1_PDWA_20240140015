<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - Tech Community</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./daftar.html">Daftar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./multimedia.html">Multimedia</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="form-box">
        <h4>📝 Form Pendaftaran</h4>
        <p class="sub">Isi data di bawah untuk bergabung.</p>

        <div class="mb-3">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" class="form-control" id="nama" />
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" />
        </div>
        <div class="mb-4">
          <label class="form-label">Bidang Minat</label>
          <select class="form-select" id="minat">
            <option value="">Pilih Bidang Minat</option>
            <option>Web Development</option>
            <option>Mobile Development</option>
            <option>Cybersecurity</option>
          </select>
        </div>

        <button
          class="btn btn-light w-100 fw-semibold mb-2"
          onclick="submitForm()"
        >
          Daftar Sekarang
        </button>
        <a href="./index.html" class="btn btn-outline-secondary w-100"
          >← Kembali ke Home</a
        >
      </div>
    </div>

    <footer>&copy; Tech Community 67</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
