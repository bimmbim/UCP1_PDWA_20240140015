<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia - Tech Community</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./daftar.html">Daftar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./multimedia.html">Multimedia</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-4">
      <h5 class="section-title">🎬 Halaman Multimedia</h5>

      <!-- GAMBAR -->
      <div class="media-box">
        <h5>🖼️ Galeri Foto</h5>
        <img id="gambar-utama" src="img3.jpg" alt="Foto Tech" />
        <div class="d-flex gap-2 mt-3">
          <button
            class="btn btn-sm btn-secondary btn-img active"
            onclick="gantiGambar(0, this)"
          >
            Foto 1
          </button>
          <button
            class="btn btn-sm btn-secondary btn-img"
            onclick="gantiGambar(1, this)"
          >
            Foto 2
          </button>
        </div>
      </div>

      <!-- AUDIO -->
      <div class="media-box">
        <h5>🎵 Audio</h5>
        <audio id="audio-ku">
          <source src="audio.mp3" type="audio/mpeg" />
        </audio>
        <div class="audio-wrap">
          <div class="audio-track">
            <div class="audio-thumb">🎧</div>
            <div>
              <div class="track-name">Tech Vibes Mix</div>
              <div class="track-sub">Tech Community Playlist</div>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-light" onclick="putarAudio()">
              ▶ Putar
            </button>
            <button class="btn btn-sm btn-secondary" onclick="jedaAudio()">
              ⏸ Jeda
            </button>
            <button
              class="btn btn-sm btn-dark border border-secondary"
              onclick="stopAudio()"
            >
              ⏹ Stop
            </button>
          </div>
          <div id="status-audio">Status: siap diputar</div>
        </div>
      </div>

      <!-- VIDEO -->
      <div class="media-box">
        <h5>🎬 Video</h5>
        <iframe
          src="video.mp4"
          title="Video Tech Community"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
        <p class="video-desc">
          Video motivasi untuk para anggota Tech Community.
        </p>
      </div>

      <a href="./index.html" class="btn btn-outline-secondary mb-3"
        >← Kembali ke Home</a
      >
    </div>

    <footer>&copy; Tech Community 67</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
