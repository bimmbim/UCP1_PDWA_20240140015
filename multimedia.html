<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multimedia - Tech Community</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #111;
        color: #ddd;
        font-family: "Segoe UI", sans-serif;
        padding-bottom: 60px;
      }

      .navbar {
        background-color: #1a1a1a !important;
        border-bottom: 1px solid #2a2a2a;
      }
      .navbar-brand {
        font-weight: 700;
        color: #fff !important;
      }
      .nav-link {
        color: #aaa !important;
      }
      .nav-link:hover,
      .nav-link.active {
        color: #fff !important;
      }

      .media-box {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 10px;
        padding: 22px;
        margin-bottom: 20px;
      }
      .media-box h5 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 14px;
      }

      .media-box img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #2a2a2a;
        transition: opacity 0.2s;
      }

      .media-box iframe {
        width: 100%;
        height: 300px;
        border-radius: 8px;
        border: none;
      }

      .btn-dark-outline {
        background: transparent;
        border: 1px solid #2a2a2a;
        color: #aaa;
        border-radius: 6px;
        padding: 5px 14px;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-dark-outline:hover,
      .btn-dark-outline.active {
        border-color: #555;
        color: #fff;
      }

      #info-gambar {
        display: none;
        margin-top: 12px;
        padding: 10px 14px;
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        font-size: 0.85rem;
        color: #888;
      }

      .audio-wrap {
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 16px;
      }
      .audio-track {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .audio-thumb {
        width: 42px;
        height: 42px;
        background: #2a2a2a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
      }
      .track-name {
        color: #fff;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .track-sub {
        color: #555;
        font-size: 0.78rem;
      }
      #status-audio {
        font-size: 0.8rem;
        color: #555;
        margin-top: 10px;
      }
      .video-desc {
        color: #666;
        font-size: 0.85rem;
        margin-top: 10px;
        margin-bottom: 0;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background-color: #1a1a1a;
        border-top: 1px solid #2a2a2a;
        text-align: center;
        padding: 14px;
        color: #444;
        font-size: 0.82rem;
        z-index: 999;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="./index.html">Tech Community</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="./index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./daftar.html">Daftar</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="./multimedia.html">Multimedia</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <h4 style="color: #fff; font-weight: 700; margin-bottom: 20px">
        🎬 Halaman Multimedia
      </h4>

      <!-- GAMBAR -->
      <div class="media-box">
        <h5>🖼️ Galeri Foto</h5>
        <img
          id="gambar-utama"
          src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800&q=80"
          alt="Foto Tech"
        />
        <div class="d-flex gap-2 flex-wrap mt-3">
          <button
            class="btn-dark-outline active"
            onclick="gantiGambar(0, this)"
          >
            Foto 1
          </button>
          <button class="btn-dark-outline" onclick="gantiGambar(1, this)">
            Foto 2
          </button>
          <button class="btn-dark-outline" onclick="gantiGambar(2, this)">
            Foto 3
          </button>
          <button class="btn-dark-outline" onclick="tampilInfo(this)">
            Info Foto
          </button>
        </div>
        <div id="info-gambar"></div>
      </div>

      <!-- AUDIO -->
      <div class="media-box">
        <h5>🎵 Audio Player</h5>
        <audio id="audio-ku">
          <source src="audio.mp3" type="audio/mpeg" />
        </audio>
        <div class="audio-wrap">
          <div class="audio-track">
            <div class="audio-thumb">🎧</div>
            <div>
              <div class="track-name">Tech Vibes Mix</div>
              <div class="track-sub">Tech Community Playlist</div>
            </div>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-sm btn-light" onclick="putarAudio()">
              ▶ Putar
            </button>
            <button class="btn btn-sm btn-secondary" onclick="jedaAudio()">
              ⏸ Jeda
            </button>
            <button
              class="btn btn-sm btn-dark border border-secondary"
              onclick="stopAudio()"
            >
              ⏹ Stop
            </button>
          </div>
          <div id="status-audio">Status: siap diputar</div>
        </div>
      </div>

      <!-- VIDEO -->
      <div class="media-box">
        <h5>🎬 Video</h5>
        <iframe
          src="video.mp4"
          title="Video Tech Community"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
        <p class="video-desc">
          Video motivasi untuk para anggota Tech Community.
        </p>
      </div>

      <a href="./index.html" class="btn btn-outline-secondary mb-3"
        >← Kembali ke Home</a
      >
    </div>

    <footer>&copy; 2026 Tech Community</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      var gambarList = [
        {
          url: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=800&q=80",
          info: "Suasana tim teknologi yang sedang bekerja bersama.",
        },
        {
          url: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?w=800&q=80",
          info: "Seorang developer sedang fokus menulis kode program.",
        },
        {
          url: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=800&q=80",
          info: "Teknologi dan inovasi untuk masa depan yang lebih baik.",
        },
      ];

      var currentIdx = 0;
      var infoTerbuka = false;

      function gantiGambar(idx, btn) {
        currentIdx = idx;
        var img = document.getElementById("gambar-utama");
        img.style.opacity = "0";
        setTimeout(function () {
          img.src = gambarList[idx].url;
          img.style.opacity = "1";
        }, 200);
        if (infoTerbuka)
          document.getElementById("info-gambar").textContent =
            gambarList[idx].info;
        document.querySelectorAll(".btn-dark-outline").forEach(function (b) {
          b.classList.remove("active");
        });
        btn.classList.add("active");
      }

      function tampilInfo(btn) {
        var box = document.getElementById("info-gambar");
        infoTerbuka = !infoTerbuka;
        if (infoTerbuka) {
          box.textContent = gambarList[currentIdx].info;
          box.style.display = "block";
          btn.classList.add("active");
        } else {
          box.style.display = "none";
          btn.classList.remove("active");
        }
      }

      var audio = document.getElementById("audio-ku");
      var status = document.getElementById("status-audio");

      function putarAudio() {
        audio.play();
        status.textContent = "Status: sedang diputar...";
      }
      function jedaAudio() {
        audio.pause();
        status.textContent = "Status: dijeda";
      }
      function stopAudio() {
        audio.pause();
        audio.currentTime = 0;
        status.textContent = "Status: dihentikan";
      }
      audio.addEventListener("ended", function () {
        status.textContent = "Status: selesai";
      });
    </script>
  </body>
</html>
